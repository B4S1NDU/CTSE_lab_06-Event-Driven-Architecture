spring.application.name=api-gateway
server.port=8080

# Gateway Routes
spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=http://order-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=http://inventory-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.routes[2].id=billing-service
spring.cloud.gateway.routes[2].uri=http://billing-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/billing/**

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
